apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  interval: 30m
  chart:
    spec:
      chart: vaultwarden
      version: "0.*"
      sourceRef:
        kind: HelmRepository
        name: vaultwarden
        namespace: vaultwarden
      interval: 12h
  values:
    domain: "https://vaultwarden.example.com"

    storage:
      data:
        name: "vaultwarden-data"
        size: "1Gi"
        path: "/data"
        accessMode: "ReadWriteOnce"

    ingress:
      enabled: false
      # Enable and configure once Traefik is running:
      # enabled: true
      # class: traefik
      # hostname: vaultwarden.example.com
