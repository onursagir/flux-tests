apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infisical
  namespace: infisical
spec:
  interval: 30m
  chart:
    spec:
      chart: infisical-standalone
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: infisical
        namespace: infisical
      interval: 12h
  values:
    infisical:
      enabled: true
      replicaCount: 1

    # Bundled PostgreSQL for persistence
    postgresql:
      enabled: true
      auth:
        existingSecret: infisical-postgresql
        secretKeys:
          adminPasswordKey: password

    # Bundled Redis for caching/queues
    redis:
      enabled: true
      architecture: standalone
      auth:
        existingSecret: infisical-redis

    ingress:
      enabled: false
      # Enable and configure once Traefik is running:
      # enabled: true
      # ingressClassName: traefik
      # hosts:
      #   - host: infisical.example.com
      #     paths:
      #       - path: /
      #         pathType: Prefix
