apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infisical
  namespace: infisical
spec:
  interval: 30m
  chart:
    spec:
      chart: infisical-standalone
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: infisical
        namespace: infisical
      interval: 12h
  values:
    infisical:
      enabled: true
      replicaCount: 1
      # References the manually created K8s secret with ENCRYPTION_KEY and AUTH_SECRET
      kubeSecretRef: infisical-secrets

    # Bundled PostgreSQL — chart manages the password and templates DB_CONNECTION_URI
    postgresql:
      enabled: true

    # Bundled Redis — chart manages the password and templates REDIS_URL
    redis:
      enabled: true
      architecture: standalone

    ingress:
      enabled: false
      # Enable and configure once Traefik is running:
      # enabled: true
      # ingressClassName: traefik
      # hosts:
      #   - host: infisical.example.com
      #     paths:
      #       - path: /
      #         pathType: Prefix
