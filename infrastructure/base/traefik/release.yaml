apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "34.*"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
      interval: 12h
  values:
    # Dashboard
    ingressRoute:
      dashboard:
        enabled: true

    # Entrypoints
    ports:
      web:
        middlewares:
          - name: redirect-to-https
            namespace: traefik
      websecure:
        tls:
          enabled: true

    # HTTP to HTTPS redirect middleware
    extraObjects:
      - apiVersion: traefik.io/v1alpha1
        kind: Middleware
        metadata:
          name: redirect-to-https
          namespace: traefik
        spec:
          redirectScheme:
            scheme: https
            permanent: true

    # Logs
    logs:
      general:
        level: INFO
      access:
        enabled: true
